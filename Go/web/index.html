<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Proyecto RV</title>
</head>
<body>

    <h1>Proyecto RV</h1>
    <h2>Universidad Nacional de Cuyo - Facultad de Ingeniería</h2>
    <h3>Integrantes:</h3>
    <ul>
        <li>Bórquez, Juan</li>
        <li>Escobar, Matías</li>    
        <li>Martín Duci, Ignacio</li>
    </ul>

    <form id="form" action="/solve" method="GET">

        <label for="L">L</label>
        <input id="L" name="L" type="range" min="1" max="10" step="1" value="1" required oninput="lValue.value = L.value" />
        <output id="lValue">1</output>
        <br>

        <label for="T">T</label>
        <input id="T" name="T" type="range" min="1" max="10" step="1" value="1" required oninput="tValue.value = T.value" />
        <output id="tValue">1</output>
        <br>

        <label for="c">c</label>
        <input id="c" name="c" type="range" min="0.1" max="2" step="0.1" value="0.9" required oninput="cValue.value = c.value" />
        <output id="cValue">0.9</output>
        <br>

        <label for="inicial">Condición inicial</label>
            <select id="inicial" name="inicial">
            <option value="seno" selected>Seno</option>
            <option value="triangular">Triangular</option>
            <option value="gauss">Pulso gaussiano</option>
        </select>
        <br>
        

        <button type="submit">Resolver</button>

    </form>

    <div id="error-div" style="color: red; min-height: 16px;"></div>
   <canvas id="canvas" style="width: auto;"></canvas>
        
<script>
  const f = document.getElementById('form');
  const errorDiv = document.getElementById('error-div');
  const canvas = document.getElementById('canvas');
  const ctx = canvas.getContext('2d');

  let rafId = null, running = false, playToken = 0;

  f.addEventListener('submit', async (e) => {
    e.preventDefault();

    // 1) pedir datos SIN cortar la animación vigente
    let res;
    try {
      const qs = new URLSearchParams(new FormData(f)).toString();
      res = await fetch(`/solve?${qs}`);
    } catch {
      errorDiv.textContent = 'Error de red';
      return;
    }

    if (!res.ok) {
      // intenta leer JSON, si no, texto
      let body;
      try { body = await res.json(); } catch { body = { error: await res.text() }; }
      errorDiv.textContent = body.message || body.error || `Error ${res.status}`;
      return;
    }

    const data = await res.json();
    if (data.error) { errorDiv.textContent = data.error; return; }
    const u = data.result;
    if (!Array.isArray(u) || !u.length || !Array.isArray(u[0]) || !u[0].length) {
      errorDiv.textContent = 'Respuesta inválida';
      return;
    }
    errorDiv.textContent = '';

    // 2) ahora sí, cortar animación anterior y arrancar la nueva
    stopAnimation();
    ctx.setTransform(1,0,0,1,0,0);
    ctx.globalAlpha = 1;
    ctx.clearRect(0,0,canvas.width,canvas.height);
    startAnimation(u);
  });

  function stopAnimation(){
    running = false;
    if (rafId !== null) { cancelAnimationFrame(rafId); rafId = null; }
  }

  function startAnimation(u){
    const W = canvas.width, H = canvas.height, pad = 30;
    const n_t = u.length, n_x = u[0].length;

    // escala global
    let umin = Infinity, umax = -Infinity;
    for (let i=0;i<n_t;i++) for (let j=0;j<n_x;j++){
      const v = u[i][j]; if (v<umin) umin=v; if (v>umax) umax=v;
    }
    if (umax === umin) umax = umin + 1e-9;

    function draw(i){
      const row = u[i];
      ctx.clearRect(0,0,W,H);

      // eje
      ctx.strokeStyle = '#bbb';
      ctx.beginPath();
      const y0 = pad + (1 - (-umin)/(umax-umin))*(H-2*pad);
      ctx.moveTo(pad, y0); ctx.lineTo(W-pad, y0); ctx.stroke();

      // curva
      ctx.strokeStyle = '#222';
      ctx.lineWidth = 1.5;
      ctx.beginPath();
      for (let j=0;j<n_x;j++){
        const x = pad + j*(W-2*pad)/(n_x-1);
        const norm = (row[j]-umin)/(umax-umin);
        const y = pad + (1-norm)*(H-2*pad);
        if (j===0) ctx.moveTo(x,y); else ctx.lineTo(x,y);
      }
      ctx.stroke();
    }

    running = true;
    const myToken = ++playToken;
    let i = 0, fps = 60, last = 0, acc = 0;

    function loop(ts){
      if (!running || myToken !== playToken) return;
      if (!last) last = ts;
      const dt = 1000/fps; acc += ts - last; last = ts;
      while (acc >= dt){ i = (i+1) % n_t; draw(i); acc -= dt; }
      rafId = requestAnimationFrame(loop);
    }

    draw(0);
    rafId = requestAnimationFrame(loop);

    // opcionales en consola
    window.pause = () => { stopAnimation(); };
    window.play  = () => { if (!running){ running=true; last=0; acc=0; rafId=requestAnimationFrame(loop);} };
    window.setFps = v => { fps = Math.max(1, Math.min(120, +v||30)); };
    window.goto = k => { i = Math.max(0, Math.min(n_t-1, k|0)); draw(i); };
  }
</script>



</body>
</html>
